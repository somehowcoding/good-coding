<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@500;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #f8fafc; overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }
        
        #blocklyArea { flex-grow: 1; position: relative; width: 100%; height: 100%; }
        #blocklyDiv { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .blocklyToolboxDiv { background-color: #fff; border-right: 1px solid #e2e8f0; width: 110px !important; }
        .blocklyTreeLabel { font-weight: 700; font-size: 14px; padding: 10px 0; }
        
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
        .pop-anim { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col">

    <div id="authScreen" class="h-screen w-full flex flex-col items-center justify-center bg-slate-50 relative z-[100]">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-black italic text-blue-600 mb-4">지존짱짱</h1>
            <p class="text-slate-400 font-bold">코딩의 세계로 오신 것을 환영합니다! 🚀</p>
        </div>
        
        <div class="bg-white p-10 rounded-[30px] shadow-xl w-[400px] border border-slate-100">
            <div id="loginForm">
                <h2 class="text-2xl font-black text-slate-800 mb-6">로그인</h2>
                <input id="loginId" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-xl font-bold mb-3 outline-none border focus:border-blue-500">
                <input id="loginPw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-4 rounded-xl font-bold mb-6 outline-none border focus:border-blue-500">
                <button onclick="login()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg hover:bg-blue-500 transition-colors shadow-md mb-4">로그인하기</button>
                <p class="text-center text-sm font-bold text-slate-400 cursor-pointer hover:text-blue-500" onclick="toggleAuth('signup')">계정이 없으신가요? 회원가입</p>
            </div>

            <div id="signupForm" class="hidden">
                <h2 class="text-2xl font-black text-slate-800 mb-6">회원가입</h2>
                <input id="signupId" type="text" placeholder="사용할 아이디" class="w-full bg-slate-50 p-4 rounded-xl font-bold mb-3 outline-none border focus:border-blue-500">
                <input id="signupPw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-4 rounded-xl font-bold mb-3 outline-none border focus:border-blue-500">
                <input id="signupNick" type="text" placeholder="멋진 닉네임 (예: 어쩌다코딩)" class="w-full bg-slate-50 p-4 rounded-xl font-bold mb-6 outline-none border focus:border-blue-500">
                <button onclick="signup()" class="w-full bg-slate-800 text-white py-4 rounded-xl font-black text-lg hover:bg-slate-700 transition-colors shadow-md mb-4">가입 완료하기</button>
                <p class="text-center text-sm font-bold text-slate-400 cursor-pointer hover:text-blue-500" onclick="toggleAuth('login')">이미 계정이 있으신가요? 로그인</p>
            </div>
        </div>
    </div>

    <nav id="topNavbar" class="hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-50">
        <div class="flex items-center gap-8">
            <h1 onclick="showMain()" class="text-2xl font-black italic text-blue-600 cursor-pointer hover:opacity-80">지존짱짱</h1>
            <button onclick="startApp()" class="font-bold text-slate-600 hover:text-blue-600 transition-colors">✨ 작품 만들기</button>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showMyPage()" class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full font-bold hover:bg-slate-200 transition-colors">
                <span class="text-xl">👤</span>
                <span id="navNickname" class="text-slate-700">게스트</span>
            </button>
            <button onclick="logout()" class="text-sm font-bold text-slate-400 hover:text-red-500">로그아웃</button>
        </div>
    </nav>

    <div id="mainScreen" class="hidden flex-grow overflow-y-auto p-10 bg-slate-50">
        <div class="max-w-5xl mx-auto">
            <div class="mb-10 text-center">
                <h2 class="text-4xl font-black text-slate-800 mb-2">모두의 멋진 작품을 만나보세요!</h2>
                <p class="text-slate-500 font-bold">인기 만점 지존짱짱 프로젝트</p>
            </div>
            <div class="grid grid-cols-4 gap-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border hover:-translate-y-1 transition-transform cursor-pointer"><div class="bg-blue-100 h-32 rounded-xl mb-3 flex justify-center items-center text-4xl">🚀</div><h3 class="font-bold">우주 탐험 게임</h3><p class="text-xs text-slate-400">제작: 마스터코더</p></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border hover:-translate-y-1 transition-transform cursor-pointer"><div class="bg-green-100 h-32 rounded-xl mb-3 flex justify-center items-center text-4xl">🐸</div><h3 class="font-bold">개구리 점프</h3><p class="text-xs text-slate-400">제작: 초보개발자</p></div>
            </div>
        </div>
    </div>

    <div id="myPageScreen" class="hidden flex-grow overflow-y-auto p-10 bg-slate-50">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center gap-4 mb-8 border-b pb-6">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex justify-center items-center text-4xl">👤</div>
                <div>
                    <h2 id="myPageTitle" class="text-3xl font-black text-slate-800">나의 작업실</h2>
                    <p class="text-slate-500 font-bold mt-1">내가 만든 소중한 작품들이 모여있어요.</p>
                </div>
            </div>
            <div id="projectList" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <div id="workspaceScreen" class="hidden h-screen flex flex-col relative z-50 bg-white">
        <header class="h-14 bg-slate-800 text-white border-b flex items-center justify-between px-6 shadow-sm shrink-0">
            <div
