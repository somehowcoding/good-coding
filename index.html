<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #f1f5f9; overflow: hidden; }
        #blocklyArea { position: relative; width: 100%; height: 100%; }
        #blocklyDiv { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
    </style>
</head>
<body>

    <div id="lobbyScreen" class="h-screen w-full flex flex-col items-center justify-center bg-slate-50 relative z-40 overflow-y-auto py-10">
        <div class="text-center mb-10">
            <h1 class="text-6xl font-black italic text-blue-600 mb-4 drop-shadow-md">지존짱짱 코딩사이트</h1>
            <button onclick="createNewProject()" class="bg-blue-600 text-white px-12 py-5 rounded-full text-2xl font-black shadow-xl hover:bg-blue-500 active:scale-95 transition-all mb-16">
                🚀 새 작품 만들기
            </button>
        </div>
        
        <div class="w-full max-w-4xl bg-white p-8 rounded-[40px] shadow-lg border border-slate-100">
            <h2 class="text-2xl font-black text-slate-800 mb-6 border-b pb-4">📁 나의 작품</h2>
            <div id="projectList" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <div id="workspaceScreen" class="hidden h-screen flex flex-col relative z-30">
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 z-20 shadow-sm shrink-0">
            <button onclick="attemptExit()" class="text-xl font-black italic text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-2">
                <span>◀ 로비로 가기</span>
            </button>
            <div class="flex items-center gap-3">
                <span id="currentProjectName" class="font-bold text-slate-400 mr-4">새 작품</span>
                <button onclick="openSaveModal()" class="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold hover:bg-slate-700 active:scale-95 transition-all">💾 저장하기</button>
                <button id="runBtn" onclick="runCode()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-black hover:bg-blue-500 active:scale-95 transition-all shadow-md">▶ 실행하기</button>
            </div>
        </header>

        <main class="flex flex-grow overflow-hidden relative">
            <div id="blocklyArea" class="flex-grow bg-white">
                <div id="blocklyDiv"></div>
            </div>

            <div class="w-[400px] bg-slate-50 border-l p-4 flex flex-col gap-4 shrink-0 z-10 shadow-xl">
                <div class="bg-zinc-900 h-[220px] rounded-3xl flex items-center justify-center relative shadow-inner border-[6px] border-zinc-800 overflow-hidden">
                    <p id="robot" class="text-7xl relative" style="left: 0px; top: 0px; transition: left 0.3s;">🤖</p>
                </div>
                <div class="flex-grow bg-white rounded-2xl p-4 border shadow-sm flex flex-col">
                    <p class="text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">변수 값 / 실행 로그</p>
                    <div id="console" class="flex-grow font-mono text-xs text-slate-600 overflow-y-auto space-y-1"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="exitWarningModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[30px] shadow-2xl max-w-sm w-full text-center">
            <h3 class="text-2xl font-black text-red-500 mb-2">⚠️ 경고!</h3>
            <p class="text-slate-600 font-bold mb-8">저장을 안 하면 작품이 사라집니다.<br>정말 그냥 나가시겠습니까?</p>
            <div class="flex gap-2 justify-center">
                <button onclick="forceExit()" class="flex-1 bg-slate-200 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-300">저장 필요없음</button>
                <button onclick="closeExitWarningAndSave()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">저장해주세요</button>
            </div>
        </div>
    </div>

    <div id="saveModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[30px] shadow-2xl max-w-sm w-full">
            <h3 class="text-2xl font-black text-slate-800 mb-6">💾 작품 저장하기</h3>
            <input id="projectNameInput" type="text" placeholder="작품 이름을 입력하세요" class="w-full bg-slate-100 p-4 rounded-xl font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 mb-4">
            <select id="projectPublicSelect" class="w-full bg-slate-50 border p-4 rounded-xl font-bold mb-8 outline-none">
                <option value="private">비공개 🔒</option>
                <option value="public">공개 🌍</option>
            </select>
            <div class="flex gap-2">
                <button onclick="closeSaveModal()" class="flex-1 bg-slate-200 text-slate-600 py-3 rounded-xl font-bold">취소</button>
                <button onclick="executeSave()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold shadow-md">저장 완료</button>
            </div>
        </div>
