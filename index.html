<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>지존짱짱 코딩사이트</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; font-family: sans-serif; overflow: hidden; }
        #blocklyDiv { width: 100%; height: calc(100vh - 60px); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-100">

    <div id="lobby" class="h-screen flex flex-col items-center justify-center">
        <h1 class="text-4xl font-black text-blue-600 mb-8">지존짱짱 코딩사이트</h1>
        <button onclick="startApp()" class="bg-blue-600 text-white px-10 py-5 rounded-full text-2xl font-bold shadow-lg hover:bg-blue-500">
            🚀 새 작품 만들기
        </button>
    </div>

    <div id="workspace" class="hidden h-screen flex flex-col">
        <header class="h-[60px] bg-white border-b flex items-center px-6 justify-between">
            <button onclick="location.reload()" class="font-bold text-blue-600">◀ 나가기</button>
            <button onclick="runCode()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">▶ 실행하기</button>
        </header>
        <div class="flex flex-grow">
            <div id="blocklyDiv"></div>
            <div class="w-[300px] bg-slate-50 border-l p-4">
                <div class="bg-black h-40 rounded-xl flex items-center justify-center text-5xl">
                    <span id="robot">🤖</span>
                </div>
                <div id="log" class="mt-4 text-xs font-mono text-slate-500 overflow-y-auto h-40 bg-white p-2 border"></div>
            </div>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="시작" colour="#ffbb00"><block type="start"></block></category>
        <category name="동작" colour="#5b67a5">
            <block type="move"></block>
            <block type="jump"></block>
        </category>
    </xml>

    <script>
        // 블록 만들기
        Blockly.Blocks['start'] = { init: function() { this.appendDummyInput().appendField("▶ 시작할 때"); this.setNextStatement(true); this.setColour(45); } };
        Blockly.JavaScript['start'] = function(block) { return ''; };
        Blockly.Blocks['move'] = { init: function() { this.appendDummyInput().appendField("앞으로 20만큼 가기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
        Blockly.JavaScript['move'] = function(block) { return 'move();\n'; };
        Blockly.Blocks['jump'] = { init: function() { this.appendDummyInput().appendField("점프하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
        Blockly.JavaScript['jump'] = function(block) { return 'jump();\n'; };

        let demoWorkspace = null;

        function startApp() {
            // 화면 전환
            document.getElementById('lobby').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');

            // 블록 창 띄우기
            if (!demoWorkspace) {
                demoWorkspace = Blockly.inject('blocklyDiv', {
                    toolbox: document.getElementById('toolbox')
                });
            }
            window.dispatchEvent(new Event('resize'));
        }

            const log = document.getElementById('log');
            const robot = document.getElementById('robot');
