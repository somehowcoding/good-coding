<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 쉽고 간편한 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; }
        .blocklySvg { border-radius: 20px; border: 2px solid #e2e8f0; }
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
        .running { ring: 4px solid #3b82f6; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <header class="flex items-center justify-between pb-4 mb-4">
        <h1 class="text-3xl font-black italic tracking-tighter text-blue-600">지존짱짱 코딩사이트</h1>
        <button onclick="runCode()" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-2xl font-black shadow-xl active:scale-95 transition-all flex items-center gap-2">
            ▶ 실행하기
        </button>
    </header>

    <main class="flex-grow flex gap-4 overflow-hidden">
        <div id="blocklyDiv" class="flex-grow h-full"></div>

        <div class="w-[350px] h-full flex flex-col gap-4">
            <div id="stageCard" class="flex-grow bg-white p-6 rounded-[40px] shadow-2xl border border-gray-100 transition-all duration-300">
                <div id="stage" class="w-full h-64 bg-zinc-900 rounded-3xl flex items-center justify-center relative overflow-hidden">
                    <p id="robot" class="text-7xl transition-all duration-200 relative" style="left: 0px;">🤖</p>
                </div>
                <div class="mt-6">
                    <p class="text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">실행 로그</p>
                    <div id="console" class="w-full h-32 bg-gray-50 rounded-2xl p-4 font-mono text-xs overflow-y-auto border border-gray-100"></div>
                </div>
            </div>
        </div>
    </main>

    <xml id="toolbox" style="display: none">
        <category name="시작" colour="#ffbb00">
            <block type="when_run_clicked"></block>
        </category>
        <category name="동작" colour="#5b67a5">
            <block type="move_robot_forward"></block>
            <block type="move_robot_jump"></block>
        </category>
        <category name="제어" colour="#5ba55b">
            <block type="controls_repeat_ext">
                <value name="TIMES"><shadow type="math_number"><field name="NUM">3</field></shadow></value>
            </block>
        </category>
    </xml>

    <script>
        // 1. [핵심] '실행하기를 눌렀을 때' 블록 정의
        Blockly.Blocks['when_run_clicked'] = {
          init: function() {
            this.appendDummyInput().appendField("▶ 실행하기를 눌렀을 때");
            this.setNextStatement(true, null); // 아래로만 연결 가능
            this.setColour(45);
            this.setTooltip("이 블록 아래에 있는 코드가 실행됩니다.");
          }
        };
        Blockly.JavaScript['when_run_clicked'] = function(block) {
