<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #f1f5f9; overflow: hidden; height: 100vh; }
        #blocklyArea { flex-grow: 1; position: relative; width: 100%; height: 100%; }
        #blocklyDiv { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hidden { display: none !important; }
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
        
        /* 🎨 왼쪽 카테고리 리스트 스타일 (엔트리 느낌) */
        .blocklyToolboxDiv { background-color: #fff; border-right: 1px solid #ddd; width: 120px !important; }
        .blocklyTreeLabel { font-weight: 700; font-size: 15px; padding: 10px 0; }
        .blocklyTreeRow { height: 45px !important; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="lobbyScreen" class="h-screen w-full flex flex-col items-center justify-center bg-white relative z-50">
        <h1 class="text-6xl font-black italic text-blue-600 mb-4">지존짱짱 코딩사이트</h1>
        <p class="text-slate-400 font-bold mb-10 text-xl">왼쪽 메뉴 리스트까지 완벽 복구! 🦾</p>
        <button onclick="startApp()" class="bg-blue-600 text-white px-14 py-6 rounded-full text-3xl font-black shadow-2xl hover:scale-105 active:scale-95 transition-all mb-12">
            🚀 새 작품 만들기
        </button>
        <div id="projectListContainer" class="w-full max-w-2xl bg-slate-50 p-6 rounded-3xl border shadow-inner">
            <h2 class="text-xl font-black mb-4 border-b pb-2 text-slate-700">📂 저장된 내 작품</h2>
            <div id="lobbyProjectList" class="grid grid-cols-1 gap-2 max-h-[200px] overflow-y-auto"></div>
        </div>
    </div>

    <div id="workspaceScreen" class="hidden h-screen flex flex-col relative z-40 bg-white">
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm">
            <button onclick="location.reload()" class="text-xl font-black italic text-blue-600 hover:opacity-70">◀ 로비로</button>
            <div class="flex items-center gap-4">
                <span id="pName" class="font-bold text-slate-300">새 작품</span>
                <button onclick="saveProject()" class="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold">💾 저장</button>
                <button onclick="runCode()" class="bg-blue-600 text-white px-8 py-2 rounded-xl font-black shadow-md">▶ 실행</button>
            </div>
        </header>

        <main class="flex flex-grow overflow-hidden">
            <div id="blocklyArea">
                <div id="blocklyDiv"></div>
            </div>

            <div class="w-[380px] bg-slate-50 border-l p-4 flex flex-col gap-4 shadow-xl shrink-0">
                <div class="bg-zinc-900 h-52 rounded-[2.5rem] flex items-center justify-center relative shadow-inner border-[6px] border-zinc-800 overflow-hidden text-7xl">
                    <p id="robot" class="relative" style="left: 0px; top: 0px; transition: 0.3s;">🤖</p>
                </div>
                <div class="flex-grow bg-white rounded-2xl p-4 border shadow-sm flex flex-col overflow-hidden">
                    <p class="text-[10px] font-black text-blue-500 mb-2 uppercase tracking-tighter">Execution Log</p>
                    <div id="console" class="flex-grow font-mono text-[12px] text-slate-600 overflow-y-auto space-y-2"></div>
                </div>
            </div>
        </main>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="시작" colour="#ffbb00"><block type="start"></block></category>
        <category name="동작" colour="#5b67a5">
            <block type="move"><value name="STEPS"><shadow type="math_number"><field name="NUM">20</field></shadow></value></block>
            <block type="jump"></block>
        </category>
        <category name="제어" colour="#5ba55b">
            <block type="controls_repeat_ext"><value name="TIMES"><shadow type="math_number"><field name="NUM">3</field></shadow></value></block>
        </category>
        <category name="변수" colour="#a55b80" custom="VARIABLE"></category>
    </xml>

    <script>
        let workspace = null;
        let projects = JSON.parse(localStorage.getItem('jijon_v2')) || [];
        let currentId = null;

        // 블록 정의
        Blockly.Blocks['start'] = { init: function() { this.appendDummyInput().appendField("▶ 시작하기 버튼 클릭"); this.setNextStatement(true); this.setColour(45); } };
        Blockly.JavaScript['start'] = function(block) { return ''; };
        Blockly.Blocks['move'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("만큼 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); this.setInputsInline(true); } };
        Blockly.JavaScript['move'] = function(block) { return `move(${Blockly.JavaScript.valueToCode(block, 'STEPS', Blockly.JavaScript.ORDER_ATOMIC) || 0});\n`; };
        Blockly.Blocks['jump'] = { init: function() { this.appendDummyInput().appendField("폴짝 점프하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
        Blockly.JavaScript['jump'] = function(block) { return 'jump();\n'; };

        function startApp() {
            document.getElementById('lobbyScreen').classList.add('hidden');
            document.getElementById('workspaceScreen').classList.remove('hidden');
            currentId = Date.now();
            if (!workspace) {
                workspace = Blockly.inject('blocklyDiv', {
                    toolbox: document.getElementById('toolbox'),
                    trashcan: true,
                    grid: {spacing: 20, length: 3, colour: '#eee', snap: true}
                });
            }
            workspace.clear();
            setTimeout(() => { Blockly.svgResize(workspace); }, 100);
        }

        function openProject(id) {
            const p = projects.find(proj => proj.id === id);
            startApp();
            currentId = p.id;
            document.getElementById('pName').innerText = p.name;
            setTimeout(() => {
                Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(p.xml), workspace);
                Blockly.svgResize(workspace);
            }, 200);
        }

        function saveProject() {
            const name = prompt("작품 이름:", "내 작품");
            if (!name) return;
            const xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(workspace));
            const data = { id: currentId, name, xml, date: new Date().toLocaleString() };
            const idx = projects.findIndex(p => p.id === currentId);
            if(idx >= 0) projects[idx] = data; else projects.push(data);
            localStorage.setItem('jijon_v2', JSON.stringify(projects));
            alert("💾 저장 완료!");
            location.reload();
        }

        function runCode() {
            const log = document.getElementById('console');
            const robot = document.getElementById('robot');
            log.innerHTML = "<b>[실행 시작]</b><br>";
            let pos = 0; robot.style.left = '0px';

            window.move = (s) => { pos += Number(s); robot.style.left = pos + 'px'; log.innerHTML += `🤖 ${s}만큼 이동!<br>`; };
            window.jump = () => { robot.classList.remove('jump-anim'); void robot.offsetWidth; robot.classList.add('jump-anim'); log.innerHTML += `✨ 폴짝 점프!<br>`; };

            try { eval(Blockly.JavaScript.workspaceToCode(workspace)); } catch(e) { alert("코드 에러!"); }
        }

        window.onload = function() {
            const list = document.getElementById('lobbyProjectList');
            if (projects.length === 0) list.innerHTML = "<p class='text-slate-400 text-center py-4'>비어있음</p>";
            projects.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-xl border hover:border-blue-500 cursor-pointer flex justify-between";
                div.innerHTML = `<b>${p.name}</b><span class='text-[10px] text-slate-400'>${p.date}</span>`;
                div.onclick = () => openProject(p.id);
                list.appendChild(div);
            });
        };
    </script>
</body>
</html>
