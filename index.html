<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow: hidden; }
        /* 블록클리 영역이 사라지지 않게 높이를 100%로 고정합니다 */
        #blocklyDiv { width: 100%; height: 100%; }
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-16 flex items-center justify-between px-6 bg-white border-b shadow-sm z-10">
        <h1 class="text-2xl font-black italic text-blue-600">지존짱짱 코딩사이트</h1>
        <button onclick="runCode()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-2 rounded-xl font-black transition-all active:scale-95">
            ▶ 실행하기
        </button>
    </header>

    <main class="flex-grow flex overflow-hidden">
        
        <div class="flex-grow relative h-full bg-white">
            <div id="blocklyDiv"></div>
        </div>

        <div class="w-[380px] h-full flex flex-col gap-4 p-4 border-l bg-gray-50 overflow-y-auto">
            <div class="bg-zinc-900 rounded-[32px] h-64 flex items-center justify-center relative overflow-hidden shadow-inner">
                <p id="robot" class="text-7xl relative" style="left: 0px; transition: left 0.2s;">🤖</p>
            </div>
            
            <div class="flex-grow bg-white rounded-3xl p-6 border shadow-sm">
                <p class="text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">실행 로그</p>
                <div id="console" class="font-mono text-xs text-gray-600 space-y-1"></div>
            </div>
        </div>
    </main>

    <xml id="toolbox" style="display: none">
        <category name="시작" colour="#ffbb00">
            <block type="when_run_clicked"></block>
        </category>
