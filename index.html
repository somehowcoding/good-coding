<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #f1f5f9; overflow: hidden; height: 100vh; width: 100vw; }
        #blocklyArea { width: 100%; height: 100%; position: relative; background: #fff; }
        #blocklyDiv { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }
        .hidden { display: none !important; }
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
    </style>
</head>
<body>

    <div id="debugLog" class="fixed top-0 left-0 z-[999] bg-red-500 text-white text-[10px] p-1 hidden"></div>

    <div id="lobbyScreen" class="h-screen w-full flex flex-col items-center justify-center bg-slate-50 relative z-50">
        <h1 class="text-5xl font-black italic text-blue-600 mb-2">지존짱짱 코딩사이트</h1>
        <p class="text-slate-400 font-bold mb-10">버그 잡을 때까지 끝까지 간다! 🦾</p>
        <button onclick="createNewProject()" class="bg-blue-600 text-white px-10 py-5 rounded-full text-xl font-black shadow-lg hover:scale-105 transition-transform active:scale-95">
            🚀 새 작품 만들기
        </button>
        <div id="projectList" class="mt-10 w-full max-w-2xl grid grid-cols-1 gap-2 px-4"></div>
    </div>

    <div id="workspaceScreen" class="hidden h-screen flex flex-col relative z-40">
        <header class="h-14 bg-white border-b flex items-center justify-between px-4 shadow-sm">
            <button onclick="location.reload()" class="font-bold text-blue-600">◀ 로비(새로고침)</button>
            <div class="flex gap-2">
                <button onclick="executeSave()" class="bg-slate-800 text-white px-4 py-1.5 rounded-lg text-sm font-bold">저장</button>
                <button onclick="runCode()" class="bg-blue-600 text-white px-6 py-1.5 rounded-lg text-sm font-black shadow-md">▶ 실행</button>
            </div>
        </header>

        <main class="flex flex-grow overflow-hidden">
            <div id="blocklyArea">
                <div id="blocklyDiv"></div>
            </div>
            <div class="w-[300px] bg-slate-100 border-l p-3 flex flex-col gap-3">
                <div class="bg-zinc-900 h-40 rounded-2xl flex items-center justify-center overflow-hidden border-4 border-zinc-800">
                    <p id="robot" class="text-6xl relative" style="left:0; top:0; transition: 0.3s;">🤖</p>
                </div>
                <div id="console" class="flex-grow bg-white rounded-xl p-3 border text-[11px] font-mono overflow-y-auto"></div>
            </div>
        </main>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="시작" colour="#ffbb00"><block type="when_run_clicked"></block></category>
        <category name="동작" colour="#5b67a5">
            <block type="move_robot_forward"><value name="STEPS"><shadow type="math_number"><field name="NUM">20</field></shadow></value></block>
            <block type="move_robot_jump"></block>
        </category>
        <category name="변수" colour="#a55b80" custom="VARIABLE"></category>
    </xml>

    <script>
        let workspace = null;
        let projects = JSON.parse(localStorage.getItem('jijon_projects')) || [];

        // 에러 로깅 함수
        function logError(msg) {
            const dbg = document.getElementById('debugLog');
            dbg.classList.remove('hidden');
            dbg.innerText += msg + "\n";
            console.error(msg);
        }

        // 블록 정의
        try {
            Blockly.Blocks['when_run_clicked'] = { init: function() { this.appendDummyInput().appendField("▶ 시작할 때"); this.setNextStatement(true); this.setColour(45); } };
            Blockly.JavaScript['when_run_clicked'] = function(block) { return ''; };
            Blockly.Blocks['move_robot_forward'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("만큼 가기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); this.setInputsInline(true); } };
            Blockly.JavaScript['move_robot_forward'] = function(block) { return `moveRobotForward(${Blockly.JavaScript.valueToCode(block, 'STEPS', Blockly.JavaScript.ORDER_ATOMIC) || 0});\n`; };
            Blockly.Blocks['move_robot_jump'] = { init: function() { this.appendDummyInput().appendField("점프!"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
            Blockly.JavaScript['move_robot_jump'] = function(block) { return 'moveRobotJump();\n'; };
        } catch(e) { logError("블록 정의 에러: " + e.message); }

        function createNewProject() {
            document.getElementById('lobbyScreen').classList.add('hidden');
            const ws = document.getElementById('workspaceScreen');
            ws.classList.remove('hidden');
            
            // 화면이 나타날 때까지 무한 반복 체크 (핵심!)
            const checkExist = setInterval(function() {
                const target = document.getElementById('blocklyDiv');
                if (target && target.offsetWidth > 0) {
                    clearInterval(checkExist);
                    try {
                        if (!workspace) {
                            workspace = Blockly.inject(target, {
                                toolbox: document.getElementById('toolbox'),
                                trashcan: true,
                                zoom: {controls: true, wheel: true}
                            });
                        }
                        workspace.clear();
                        Blockly.svgResize(workspace);
                    } catch(e) { logError("Blockly 주입 에러: " + e.message); }
                }
            }, 100);
        }

        function executeSave() {
            const name = prompt("작품 이름을 입력하세요", "나의 작품");
            if(!name) return;
            const xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(workspace));
            projects.push({ id: Date.now(), name, xml, date: new Date().toLocaleDateString() });
            localStorage.setItem('jijon_projects', JSON.stringify(projects));
            alert("저장 완료!");
            location.reload(); // 저장 후 깔끔하게 리로드
        }

        function runCode() {
            const robot = document.getElementById('robot');
            const con = document.getElementById('console');
            con.innerHTML = "실행 중...<br>";
            let pos = 0;
            robot.style.left = '0px';

            window.moveRobotForward = (s) => { pos += Number(s); robot.style.left = pos + 'px'; con.innerHTML += `이동: ${s}<br>`; };
            window.moveRobotJump = () => { robot.classList.remove('jump-anim'); void robot.offsetWidth; robot.classList.add('jump-anim'); con.innerHTML += `점프!<br>`; };
            
            const start = workspace.getTopBlocks(false).find(b => b.type === 'when_run_clicked');
            if(!start) return alert("시작 블록을 연결하세요!");
            
            Blockly.JavaScript.init(workspace);
            eval(Blockly.JavaScript.finish(Blockly.JavaScript.blockToCode(start.getNextBlock())));
        }

        window.onload = function() {
            const list = document.getElementById('projectList');
            projects.forEach(p => {
