<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 쉽고 간편한 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f0f4f8; }
        .blocklySvg { border-radius: 15px; border: 2px solid #e2e8f0; }
        /* 점프 애니메이션 */
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
        }
        /* 실행 중 반짝이는 효과 */
        .running { box-shadow: 0 0 20px rgba(59, 130, 246, 0.5); border-color: #3b82f6 !important; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <header class="flex items-center justify-between pb-4 border-b-2 border-gray-200 mb-4">
        <h1 class="text-3xl font-black italic tracking-tighter text-blue-600 uppercase">지존짱짱 코딩사이트</h1>
        <div class="flex gap-2">
            <button id="runBtn" onclick="runCode()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-full font-black shadow-lg active:scale-95 transition-all flex items-center gap-2">
                <span id="btnIcon">▶</span> <span id="btnText">실행하기</span>
            </button>
        </div>
    </header>

    <main class="flex-grow flex gap-4 overflow-hidden">
        <div id="blocklyArea" class="flex-grow h-full relative">
            <div id="blocklyDiv" class="absolute inset-0"></div>
        </div>

        <div class="w-[30%] h-full flex flex-col gap-4">
            <div id="stageCard" class="flex-grow bg-white p-6 rounded-[32px] shadow-xl border border-gray-100 transition-all duration-500">
                <h2 class="text-xl font-black mb-4 text-gray-800 flex justify-between">
                    무대 <span id="statusBadge" class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-400 uppercase">Idle</span>
                </h2>
                <div id="stage" class="w-full h-[60%] bg-zinc-900 rounded-2xl flex items-center justify-center border-4 border-zinc-900 overflow-hidden relative">
                    <p id="robot" class="text-8xl transition-all duration-300 relative" style="left: 0px;">🤖</p>
                </div>
                <div class="mt-6">
                    <p class="text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">Output Log</p>
                    <div id="console" class="w-full h-24 bg-gray-50 rounded-xl p-4 font-mono text-sm overflow-y-auto border border-gray-100 text-gray-700"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-4 text-center text-gray-400 text-[10px] font-black tracking-[0.4em] uppercase py-2">
        Made by 어쩌다코딩
    </footer>

    <xml id="toolbox" style="display: none">
        <category name="동작" colour="#5b67a5">
            <block type="move_robot_forward"></block>
            <block type="move_robot_jump"></block>
        </category>
        <category name="반복/제어" colour="#5ba55b">
            <block type="controls_repeat_ext">
                <value name="TIMES"><shadow type="math_number"><field name="NUM">5</field></shadow></value>
            </block>
        </category>
        <category name="출력" colour="#a55b80">
            <block type="text_print"></block>
            <block type="text"></block>
        </category>
    </xml>

    <script>
        // 커스텀 블록 정의
        Blockly.Blocks['move_robot_forward'] = { init: function() { this.appendDummyInput().appendField("앞으로 이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
        Blockly.JavaScript['move_robot_forward'] = function(block) { return 'moveRobotForward();\n'; };

        Blockly.Blocks['move_robot_jump'] = { init: function() { this.appendDummyInput().appendField("점프하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
        Blockly.JavaScript['move_robot_jump'] = function(block) { return 'moveRobotJump();\n'; };

        // 워크스페이스 생성
        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });

        // 오디오 효과 (브라우저 기본 알림음 활용)
        const playSound = () => {
            const context = new AudioContext();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain);
            gain.connect(context.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, context.currentTime);
            gain.gain.setValueAtTime(0.1, context.currentTime);
            osc.start();
            osc.stop(context.currentTime + 0.1);
        };

        const robot = document.getElementById('robot');
        const stageCard = document.getElementById('stageCard');
        const statusBadge = document.getElementById('statusBadge');
        let currentPos = 0;

        function runCode() {
            // 1. 버튼 및 무대 시각 효과 추가
            playSound(); // 실행 시 띡! 소리
            stageCard.classList.add('running');
            statusBadge.innerText = "Running";
            statusBadge.classList.replace('text-zinc-400', 'text-blue-500');

            const code = Blockly.JavaScript.workspaceToCode(workspace);
            document.getElementById('console').innerHTML = "";
            currentPos = 0;
            robot.style.left = '0px';

            window.moveRobotForward = () => {
                currentPos += 30;
                robot.style.left = currentPos + 'px';
            };
            window.moveRobotJump = () => {
                robot.classList.remove('jump-anim');
                void robot.offsetWidth; // 애니메이션 리셋 트릭
                robot.classList.add('jump-anim');
            };
            window.print = (t) => {
                document.getElementById('console').innerHTML += `> ${t}<br>`;
            };

            try {
                eval(code);
                // 실행 완료 후 효과 제거 (1초 뒤)
                setTimeout(() => {
                    stageCard.classList.remove('running');
                    statusBadge.innerText = "Idle";
                    statusBadge.classList.replace('text-blue-500', 'text-zinc-400');
                }, 1000);
            } catch (e) {
                alert("코드를 확인해주세요!");
            }
        }
    </script>
</body>
</html>
