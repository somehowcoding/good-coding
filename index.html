<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지존짱짱 코딩사이트</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/ko.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@500;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: #f8fafc; overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }
        
        #blocklyArea { flex-grow: 1; position: relative; width: 100%; height: 100%; }
        #blocklyDiv { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .blocklyToolboxDiv { background-color: #fff; border-right: 1px solid #e2e8f0; width: 110px !important; }
        
        .jump-anim { animation: jump 0.3s ease; }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
        .pop-anim { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col">

    <div id="authScreen" class="fixed inset-0 w-full h-screen flex flex-col items-center justify-center bg-slate-50 z-[200]">
        <div class="text-center mb-8">
            <h1 class="text-6xl font-black italic text-blue-600 mb-2">지존짱짱</h1>
            <p class="text-slate-400 font-bold">어쩌다코딩 님, 로그인이 필요합니다! 🚀</p>
        </div>
        
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-[420px] border border-slate-100">
            <div id="loginForm">
                <h2 class="text-2xl font-black text-slate-800 mb-6">로그인</h2>
                <input id="loginId" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-2xl font-bold mb-3 outline-none border focus:border-blue-500 transition-all">
                <input id="loginPw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-4 rounded-2xl font-bold mb-6 outline-none border focus:border-blue-500 transition-all">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-500 shadow-lg mb-4 transition-all">로그인</button>
                <p class="text-center text-sm font-bold text-slate-400 cursor-pointer hover:text-blue-600" onclick="toggleAuth('signup')">아직 계정이 없나요? 회원가입</p>
            </div>

            <div id="signupForm" class="hidden">
                <h2 class="text-2xl font-black text-slate-800 mb-6">회원가입</h2>
                <input id="signupId" type="text" placeholder="아이디" class="w-full bg-slate-50 p-4 rounded-2xl font-bold mb-3 outline-none border focus:border-blue-500 transition-all">
                <input id="signupPw" type="password" placeholder="비밀번호" class="w-full bg-slate-50 p-4 rounded-2xl font-bold mb-3 outline-none border focus:border-blue-500 transition-all">
                <input id="signupNick" type="text" placeholder="닉네임 (예: 어쩌다코딩)" class="w-full bg-slate-50 p-4 rounded-2xl font-bold mb-6 outline-none border focus:border-blue-500 transition-all">
                <button onclick="handleSignup()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black text-lg hover:bg-slate-700 shadow-lg mb-4 transition-all">가입하기</button>
                <p class="text-center text-sm font-bold text-slate-400 cursor-pointer hover:text-blue-600" onclick="toggleAuth('login')">이미 계정이 있나요? 로그인</p>
            </div>
        </div>
    </div>

    <nav id="topNavbar" class="hidden h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0 z-50">
        <div class="flex items-center gap-8">
            <h1 onclick="showMain()" class="text-2xl font-black italic text-blue-600 cursor-pointer">지존짱짱</h1>
            <button onclick="startApp()" class="font-bold text-slate-600 hover:text-blue-600 transition-colors">✨ 작품 만들기</button>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="showMyPage()" class="flex items-center gap-2 bg-slate-100 px-4 py-2 rounded-full font-bold hover:bg-slate-200">
                <span class="text-xl">👤</span>
                <span id="navNickname" class="text-slate-700">게스트</span>
            </button>
            <button onclick="handleLogout()" class="text-sm font-bold text-slate-400 hover:text-red-500">로그아웃</button>
        </div>
    </nav>

    <div id="mainScreen" class="hidden flex-grow overflow-y-auto p-10 bg-slate-50">
        <div class="max-w-5xl mx-auto">
            <div class="mb-10 text-center">
                <h2 class="text-4xl font-black text-slate-800 mb-2">모두의 작품 공간</h2>
                <p class="text-slate-500 font-bold">지존짱짱한 코딩들을 구경해보세요!</p>
            </div>
            <div class="grid grid-cols-4 gap-6">
                <div class="bg-white p-4 rounded-2xl shadow-sm border"><div class="bg-blue-100 h-32 rounded-xl mb-3 flex justify-center items-center text-4xl">🚀</div><h3 class="font-bold">우주 전쟁</h3></div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border"><div class="bg-pink-100 h-32 rounded-xl mb-3 flex justify-center items-center text-4xl">💖</div><h3 class="font-bold">하트 팡팡</h3></div>
            </div>
        </div>
    </div>

    <div id="myPageScreen" class="hidden flex-grow overflow-y-auto p-10 bg-slate-50">
        <div class="max-w-4xl mx-auto">
            <h2 id="myPageTitle" class="text-3xl font-black text-slate-800 mb-8 border-b pb-6 italic">나의 작업실</h2>
            <div id="projectList" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <div id="workspaceScreen" class="hidden h-screen flex flex-col relative z-50 bg-white">
        <header class="h-14 bg-slate-900 text-white flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="showMain()" class="text-sm font-bold text-slate-400 hover:text-white">◀ 나가기</button>
                <span id="pName" class="font-bold">새 작품</span>
            </div>
            <div class="flex gap-2">
                <button onclick="saveProject()" class="bg-slate-700 px-4 py-1.5 rounded-lg font-bold text-sm">💾 저장</button>
                <button onclick="runCode()" class="bg-blue-500 px-6 py-1.5 rounded-lg font-black text-sm">▶ 실행</button>
            </div>
        </header>

        <main class="flex flex-grow overflow-hidden relative">
            <div id="blocklyArea"><div id="blocklyDiv"></div></div>
            <div class="w-[360px] bg-slate-50 border-l p-4 flex flex-col gap-3 shrink-0">
                <div id="stage" class="bg-white h-52 rounded-2xl border-2 border-slate-200 overflow-hidden relative shadow-inner">
                    <div id="robot" class="absolute text-5xl" style="left: 20px; top: 70px; transition: 0.3s;">🤖</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="addObject()" class="flex-1 bg-blue-100 text-blue-600 py-2 rounded-xl font-bold text-sm">➕ 오브젝트 추가</button>
                    <button onclick="clearObjects()" class="bg-slate-200 text-slate-600 px-3 py-2 rounded-xl font-bold text-sm">🗑️</button>
                </div>
                <div id="console" class="flex-grow bg-zinc-900 rounded-2xl p-4 font-mono text-[11px] text-green-400 overflow-y-auto"></div>
            </div>
        </main>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="시작" colour="#ffbb00"><block type="start"></block></category>
        <category name="동작" colour="#5b67a5">
            <block type="move"><value name="STEPS"><shadow type="math_number"><field name="NUM">20</field></shadow></value></block>
            <block type="jump"></block>
        </category>
        <category name="제어" colour="#5ba55b"><block type="controls_repeat_ext"><value name="TIMES"><shadow type="math_number"><field name="NUM">3</field></shadow></value></block></category>
    </xml>

    <script>
        // --- 전역 데이터 ---
        let users = JSON.parse(localStorage.getItem('jijon_users')) || [];
        let currentUser = JSON.parse(localStorage.getItem('jijon_currentUser')) || null;
        let projects = JSON.parse(localStorage.getItem('jijon_projects_final')) || [];
        let workspace = null;
        let currentId = null;

        // --- 인증 시스템 ---
        function toggleAuth(type) {
            document.getElementById('loginForm').classList.toggle('hidden', type === 'signup');
            document.getElementById('signupForm').classList.toggle('hidden', type === 'login');
        }

        function handleSignup() {
            const id = document.getElementById('signupId').value.trim();
            const pw = document.getElementById('signupPw').value.trim();
            const nick = document.getElementById('signupNick').value.trim();

            if (!id || !pw || !nick) return alert("모든 칸을 입력해 주세요!");
            if (users.some(u => u.id === id)) return alert("이미 존재하는 아이디입니다.");

            users.push({ id, pw, nickname: nick });
            localStorage.setItem('jijon_users', JSON.stringify(users));
            alert("회원가입 성공! 이제 로그인해 주세요.");
            toggleAuth('login');
        }

        function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const pw = document.getElementById('loginPw').value.trim();
            const user = users.find(u => u.id === id && u.pw === pw);

            if (user) {
                currentUser = user;
                localStorage.setItem('jijon_currentUser', JSON.stringify(currentUser));
                updateUI();
            } else {
                alert("아이디 또는 비밀번호가 틀렸습니다.");
            }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('jijon_currentUser');
            location.reload();
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('topNavbar').classList.remove('hidden');
                document.getElementById('navNickname').innerText = currentUser.nickname;
                document.getElementById('myPageTitle').innerText = `${currentUser.nickname} 님의 작업실`;
                showMain();
            }
        }

        // --- 화면 전환 ---
        function showMain() {
            document.getElementById('topNavbar').classList.remove('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            document.getElementById('myPageScreen').classList.add('hidden');
            document.getElementById('workspaceScreen').classList.add('hidden');
        }

        function showMyPage() {
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('myPageScreen').classList.remove('hidden');
            renderMyProjects();
        }

        function startApp() {
            if (!currentUser) return alert("로그인이 필요한 서비스입니다!");
            document.getElementById('topNavbar').classList.add('hidden');
            document.getElementById('mainScreen').classList.add('hidden');
            document.getElementById('myPageScreen').classList.add('hidden');
            document.getElementById('workspaceScreen').classList.remove('hidden');
            
            currentId = Date.now();
            if (!workspace) {
                workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });
            }
            workspace.clear();
            setTimeout(() => Blockly.svgResize(workspace), 100);
        }

        // --- 프로젝트 관리 ---
        function renderMyProjects() {
            const list = document.getElementById('projectList');
            const myProj = projects.filter(p => p.authorId === currentUser.id);
            list.innerHTML = myProj.length ? '' : '<p class="text-slate-400 font-bold text-center col-span-2 py-20">작품이 없습니다.</p>';
            myProj.forEach(p => {
                const div = document.createElement('div');
                div.className = "bg-white p-6 rounded-2xl border hover:border-blue-500 cursor-pointer shadow-sm";
                div.innerHTML = `<h3 class="font-black text-lg">${p.name}</h3><p class="text-xs text-slate-400">${p.date}</p>`;
                div.onclick = () => {
                    startApp();
                    currentId = p.id;
                    document.getElementById('pName').innerText = p.name;
                    setTimeout(() => Blockly.Xml.domToWorkspace(Blockly.Xml.textToDom(p.xml), workspace), 200);
                };
                list.appendChild(div);
            });
        }

        function saveProject() {
            const name = prompt("작품 이름:", document.getElementById('pName').innerText);
            if (!name) return;
            const xml = Blockly.Xml.domToText(Blockly.Xml.workspaceToDom(workspace));
            const data = { id: currentId, name, xml, authorId: currentUser.id, date: new Date().toLocaleDateString() };
            const idx = projects.findIndex(p => p.id === currentId);
            if (idx >= 0) projects[idx] = data; else projects.push(data);
            localStorage.setItem('jijon_projects_final', JSON.stringify(projects));
            alert("저장 완료!");
            showMyPage();
        }

        // --- 코딩 기능 ---
        Blockly.Blocks['start'] = { init: function() { this.appendDummyInput().appendField("▶ 시작하기"); this.setNextStatement(true); this.setColour(45); } };
        Blockly.JavaScript['start'] = function(block) { return ''; };
        Blockly.Blocks['move'] = { init: function() { this.appendValueInput("STEPS").setCheck("Number").appendField("앞으로"); this.appendDummyInput().appendField("이동"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
        Blockly.JavaScript['move'] = function(block) { return `move(${Blockly.JavaScript.valueToCode(block, 'STEPS', Blockly.JavaScript.ORDER_ATOMIC) || 0});\n`; };
        Blockly.Blocks['jump'] = { init: function() { this.appendDummyInput().appendField("점프하기"); this.setPreviousStatement(true); this.setNextStatement(true); this.setColour(230); } };
        Blockly.JavaScript['jump'] = function(block) { return 'jump();\n'; };

        function addObject() {
            const emo = ['🐱','🐶','🦊','🍎','🚗','🤖'][Math.floor(Math.random()*6)];
            const div = document.createElement('div');
            div.className = "absolute text-4xl pop-anim";
            div.style.left = Math.random()*280+'px'; div.style.top = Math.random()*150+'px';
            div.innerText = emo;
            document.getElementById('stage').appendChild(div);
        }

        function clearObjects() {
            document.getElementById('stage').innerHTML = '<div id="robot" class="absolute text-5xl" style="left: 20px; top: 70px; transition: 0.3s;">🤖</div>';
        }

        function runCode() {
            const log = document.getElementById('console');
            const robot = document.getElementById('robot');
            log.innerHTML += "> 실행 시작...<br>";
            let pos = 20;
            window.move = (s) => { pos += Number(s); robot.style.left = pos+'px'; log.innerHTML += `> ${s} 이동<br>`; };
            window.jump = () => { robot.classList.remove('jump-anim'); void robot.offsetWidth; robot.classList.add('jump-anim'); log.innerHTML += `> 점프!<br>`; };
            try { eval(Blockly.JavaScript.workspaceToCode(workspace)); } catch(e) { alert("에러 발생!"); }
        }

        window.onload = updateUI;
    </script>
</body>
</html>
